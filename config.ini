[CONNECTION]
; Replace these with your own SSH jump host details.
; IMPORTANT: The key must have NO passphrase (or use ssh-agent).
vm_ip=your-jump-host.example.com
key_path=C:\\path\\to\\your\\private\\key.pem
vm_user=ubuntu

[BROWSER]
app_name=NotepadHelper
home_url=https://google.com
local_port=1080
remote_port=40000
auto_launch=true
auto_launch_delay=2
auto_launch_retries=15
browser_channel=auto

